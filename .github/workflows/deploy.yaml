name: Deploy app

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: login
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: build server image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/music-server:latest ./server

      - name: push server image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/music-server:latest

      - name: build client image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/music-client:latest ./client

      - name: push client image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/music-client:latest

      - name: setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: deploy on VM
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} '
            cd ~/music-app &&
            docker compose pull &&
            docker compose up -d
          '